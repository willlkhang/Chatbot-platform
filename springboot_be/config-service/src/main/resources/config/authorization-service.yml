server:
  port: 8087

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://discovery-service:8061/eureka/}
---
spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:chatbot}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:12345678}
    hikari:
      poolName: Hikari
      maximumPoolSize: 5
      auto-commit: false
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate.default_schema: db_user
      hibernate.id.new_generator_mappings: true
      hibernate.connection.provider_disables_autocommit: true
      hibernate.cache.use_second_level_cache: false
      hibernate.cache.use_query_cache: false
      hibernate.generate_statistics: false
  app:
    oauth-url: ${OAUTH_URL:http://authorization-service:${server.port}/oauth2/token}

security:
  client-id: ${CLIENT_ID:project}
  client-secret: ${CLIENT_SECRET:secret}
  issuer: ${AUTH_ISSUER:http://authorization-service:${server.port}}
  jwt:
    duration: ${JWT_DURATION:6000}


---
#local development
spring:
  config:
    activate:
      on-profile: dev
  app:
    oauth-url: http://192.168.8.200:${server.port}/oauth2/token
security:
  issuer: ${AUTH_ISSUER:http://localhost:${server.port}}

---
#vps production config
spring:
  config:
    activate:
      on-profile: prod
  app:
    oauth-url: http://170.64.179.146:${server.port}/oauth2/to
security:
  issuer: ${AUTH_ISSUER:http://170.64.179.146:${server.port}}