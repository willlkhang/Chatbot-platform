<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 1640" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="arrowMuted" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <style>
      .lbl   { font-size: 26px; font-weight: 700; fill: #0f172a; }
      .sub   { font-size: 19px; fill: #475569; }
      .group { font-size: 24px; font-weight: 800; letter-spacing: 1px; }
      .edge  { stroke: #334155; stroke-width: 3; fill: none; }
      .edgeM { stroke: #94a3b8; stroke-width: 2.5; stroke-dasharray: 7 6; fill: none; }
      .elbl  { font-size: 16px; fill: #334155; font-weight: 600; }
    </style>
  </defs>

  <!-- Title -->
  <text x="620" y="48" text-anchor="middle" font-size="34" font-weight="800" fill="#0f172a">AI Learning Assistant - System Architecture</text>

  <!-- User -->
  <rect x="500" y="80" width="240" height="64" rx="14" fill="#1e293b"/>
  <text x="620" y="112" text-anchor="middle" font-size="24" font-weight="700" fill="#ffffff">Student</text>
  <text x="620" y="135" text-anchor="middle" font-size="16" fill="#cbd5e1">web browser</text>
  <path class="edge" d="M620,144 L620,184" marker-end="url(#arrow)"/>

  <!-- Frontend -->
  <rect x="380" y="186" width="480" height="78" rx="14" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <text x="620" y="220" text-anchor="middle" class="lbl">Frontend - Next.js (React)</text>
  <text x="620" y="247" text-anchor="middle" class="sub">chat UI | login / signup | personalization</text>
  <path class="edge" d="M620,264 L620,306" marker-end="url(#arrow)"/>
  <text x="636" y="292" class="elbl">HTTPS</text>

  <!-- Gateway -->
  <rect x="360" y="308" width="520" height="92" rx="14" fill="#312e81" stroke="#1e1b4b" stroke-width="3"/>
  <text x="620" y="346" text-anchor="middle" font-size="27" font-weight="800" fill="#ffffff">API Gateway (Spring Cloud Gateway)</text>
  <text x="620" y="376" text-anchor="middle" font-size="18" fill="#c7d2fe">single entrypoint | JWT validation | routing | CORS</text>

  <!-- Support services -->
  <rect x="912" y="300" width="270" height="50" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2.5"/>
  <text x="1047" y="332" text-anchor="middle" class="sub">Eureka Discovery</text>
  <rect x="912" y="360" width="270" height="50" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2.5"/>
  <text x="1047" y="392" text-anchor="middle" class="sub">Config Server</text>
  <path class="edgeM" d="M912,348 L880,352"/>
  <path class="edgeM" d="M912,378 L880,372"/>
  <text x="1047" y="430" text-anchor="middle" font-size="15" fill="#94a3b8">platform support</text>

  <!-- split arrows -->
  <path class="edge" d="M620,400 L620,430 L300,430 L300,486" marker-end="url(#arrow)"/>
  <path class="edge" d="M620,400 L620,430 L920,430 L920,486" marker-end="url(#arrow)"/>

  <!-- Business microservices group -->
  <rect x="60" y="486" width="510" height="560" rx="18" fill="#f8fafc" stroke="#0284c7" stroke-width="3"/>
  <text x="84" y="522" class="group" fill="#0284c7">BUSINESS MICROSERVICES</text>
  <text x="84" y="546" class="sub">Spring Boot | OAuth2 resource servers</text>

  <rect x="90" y="566" width="450" height="74" rx="12" fill="#ffffff" stroke="#0284c7" stroke-width="2.5"/>
  <text x="315" y="598" text-anchor="middle" class="lbl">Authorization Service</text>
  <text x="315" y="623" text-anchor="middle" class="sub">OAuth2 password grant | JWT issuer</text>

  <rect x="90" y="654" width="450" height="62" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="2.5"/>
  <text x="315" y="692" text-anchor="middle" class="lbl">User Service</text>

  <rect x="90" y="730" width="450" height="62" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="2.5"/>
  <text x="315" y="768" text-anchor="middle" class="lbl">Chat Service</text>

  <rect x="90" y="806" width="450" height="62" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="2.5"/>
  <text x="315" y="844" text-anchor="middle" class="lbl">Personalization Service</text>

  <!-- Postgres -->
  <path class="edge" d="M315,868 L315,902" marker-end="url(#arrow)"/>
  <rect x="150" y="904" width="330" height="118" rx="12" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
  <text x="315" y="952" text-anchor="middle" font-size="26" font-weight="800" fill="#1e3a8a">PostgreSQL</text>
  <text x="315" y="982" text-anchor="middle" class="sub">users | chats | personalization</text>

  <!-- AI services group -->
  <rect x="640" y="486" width="540" height="700" rx="18" fill="#fffbeb" stroke="#d97706" stroke-width="3"/>
  <text x="664" y="522" class="group" fill="#b45309">AI SERVICES</text>

  <!-- Classifier -->
  <rect x="676" y="544" width="468" height="78" rx="12" fill="#ffffff" stroke="#d97706" stroke-width="2.5"/>
  <text x="910" y="576" text-anchor="middle" class="lbl">Topic Classifier</text>
  <text x="910" y="601" text-anchor="middle" class="sub">FastAPI | scikit-learn LinearSVC | routes to course</text>
  <path class="edge" d="M910,622 L910,656" marker-end="url(#arrow)"/>

  <!-- RAG agent -->
  <rect x="676" y="658" width="468" height="92" rx="12" fill="#fef3c7" stroke="#b45309" stroke-width="3"/>
  <text x="910" y="694" text-anchor="middle" font-size="27" font-weight="800" fill="#7c2d12">RAGbot - LangGraph Agent</text>
  <text x="910" y="722" text-anchor="middle" class="sub">tool-calling reasoning loop | Socratic tutoring</text>

  <!-- agent resources -->
  <path class="edge" d="M780,750 L780,792" marker-end="url(#arrow)"/>
  <path class="edge" d="M1040,750 L1040,792" marker-end="url(#arrow)"/>

  <rect x="676" y="794" width="220" height="92" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="2.5"/>
  <text x="786" y="830" text-anchor="middle" class="lbl">Pinecone</text>
  <text x="786" y="856" text-anchor="middle" class="sub">vector DB | course</text>
  <text x="786" y="876" text-anchor="middle" class="sub">embeddings</text>

  <rect x="924" y="794" width="220" height="92" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="2.5"/>
  <text x="1034" y="830" text-anchor="middle" class="lbl">LLMs</text>
  <text x="1034" y="856" text-anchor="middle" class="sub">Gemini | OpenAI</text>
  <text x="1034" y="876" text-anchor="middle" class="sub">| Ollama</text>

  <rect x="800" y="906" width="220" height="60" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="2.5"/>
  <text x="910" y="944" text-anchor="middle" class="lbl">Tavily Web Search</text>
  <path class="edge" d="M820,886 L880,906" marker-end="url(#arrow)"/>

  <!-- grounding note -->
  <text x="910" y="1010" text-anchor="middle" font-size="18" fill="#92400e" font-weight="700">grounded, course-specific answers</text>
  <text x="910" y="1036" text-anchor="middle" font-size="16" fill="#b45309">retrieval + agent loop reduce hallucination</text>

  <!-- observability -->
  <rect x="744" y="1066" width="332" height="56" rx="10" fill="#fef9c3" stroke="#ca8a0a" stroke-width="2.5"/>
  <text x="910" y="1101" text-anchor="middle" class="sub">LangSmith - tracing &amp; evaluation</text>

  <!-- Offline data pipeline -->
  <rect x="60" y="1226" width="1120" height="290" rx="18" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>
  <text x="84" y="1262" class="group" fill="#6d28d9">OFFLINE DATA PIPELINE</text>

  <rect x="100" y="1290" width="320" height="92" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="260" y="1326" text-anchor="middle" class="lbl">unit_extractor</text>
  <text x="260" y="1352" text-anchor="middle" class="sub">extracts course materials</text>

  <rect x="100" y="1404" width="320" height="92" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="260" y="1440" text-anchor="middle" class="lbl">synthetic_data_generator</text>
  <text x="260" y="1466" text-anchor="middle" class="sub">fine-tuned Phi-3 (Unsloth)</text>

  <!-- pipeline arrows -->
  <path class="edge" d="M420,1336 L560,1336 L560,1395" marker-end="url(#arrow)"/>
  <text x="466" y="1326" class="elbl">course text</text>
  <rect x="470" y="1404" width="300" height="92" rx="12" fill="#ede9fe" stroke="#6d28d9" stroke-width="3"/>
  <text x="620" y="1440" text-anchor="middle" class="lbl">Training data</text>
  <text x="620" y="1466" text-anchor="middle" class="sub">labelled topic dataset</text>

  <!-- to Pinecone embeddings -->
  <path class="edgeM" d="M420,1336 L786,1336 L786,966" marker-end="url(#arrowMuted)"/>
  <text x="800" y="1180" class="elbl" fill="#7c3aed">embedded -&gt; Pinecone</text>

  <!-- training data trains classifier -->
  <path class="edgeM" d="M770,1450 L910,1450 L910,624" marker-end="url(#arrowMuted)"/>
  <text x="924" y="1450" class="elbl" fill="#7c3aed">trains classifier</text>

  <!-- Footnote -->
  <text x="620" y="1556" text-anchor="middle" font-size="18" fill="#475569">Fully containerized | one-command deploy with docker compose up</text>
  <text x="620" y="1584" text-anchor="middle" font-size="15" fill="#94a3b8">8 backend microservices | 5 AI / data components | Next.js frontend</text>
</svg>
