services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: chatbot
    # Intentionally not published to host. Other services reach it on the
    # internal docker network as `postgres:5432`.
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatbot"]
      interval: 5s
      timeout: 5s
      retries: 20

  config-service:
    build:
      context: ./springboot_be
      dockerfile: Dockerfile
      args:
        SERVICE: config-service
    environment:
      SPRING_PROFILES_ACTIVE: native
    expose:
      - "8088"
    depends_on:
      postgres:
        condition: service_healthy

  discovery-service:
    build:
      context: ./springboot_be
      dockerfile: Dockerfile
      args:
        SERVICE: discovery-service
    environment:
      CONFIG_SERVER_URL: http://config-service:8088/
      EUREKA_HOST: discovery-service
    expose:
      - "8061"
    depends_on:
      config-service:
        condition: service_started

  gateway-service:
    build:
      context: ./springboot_be
      dockerfile: Dockerfile
      args:
        SERVICE: gateway-service
    environment:
      CONFIG_SERVER_URL: http://config-service:8088/
      EUREKA_URL: http://discovery-service:8061/eureka/
    ports:
      - "${GATEWAY_HOST_PORT}:8060"
    depends_on:
      discovery-service:
        condition: service_started

  authorization-service:
    build:
      context: ./springboot_be
      dockerfile: Dockerfile
      args:
        SERVICE: authorization-service
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      CONFIG_SERVER_URL: http://config-service:8088/
      EUREKA_URL: http://discovery-service:8061/eureka/
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: chatbot
      DB_USER: postgres
      DB_PASSWORD: 12345678
      #Internal Docker hostname — overrides profile defaults for service-to-service calls
      AUTH_ISSUER: http://authorization-service:8087
      OAUTH_URL: http://authorization-service:8087/oauth2/token
    expose:
      - "8087"
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_started

  user-service:
    build:
      context: ./springboot_be
      dockerfile: Dockerfile
      args:
        SERVICE: user-service
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      CONFIG_SERVER_URL: http://config-service:8088/
      EUREKA_URL: http://discovery-service:8061/eureka/
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: chatbot
      DB_USER: postgres
      DB_PASSWORD: 12345678
      AUTH_ISSUER: http://authorization-service:8087
    expose:
      - "8085"
    depends_on:
      postgres:
        condition: service_healthy
      authorization-service:
        condition: service_started

  chat-service:
    build:
      context: ./springboot_be
      dockerfile: Dockerfile
      args:
        SERVICE: chat-service
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      CONFIG_SERVER_URL: http://config-service:8088/
      EUREKA_URL: http://discovery-service:8061/eureka/
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: chatbot
      DB_USER: postgres
      DB_PASSWORD: 12345678
      AUTH_ISSUER: http://authorization-service:8087
    expose:
      - "8086"
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_started

  frontend:
    build:
      context: ./frontend/my-fe
      args:
        # Baked into the Next.js build. Defaults support "just run locally".
        NEXT_PUBLIC_API_GATEWAY: ${NEXT_PUBLIC_API_GATEWAY}
        NEXT_PUBLIC_RAGBOT_API: ${NEXT_PUBLIC_RAGBOT_API}
    ports:
      - "${FRONTEND_HOST_PORT}:3000"
    depends_on:
      gateway-service:
        condition: service_started

volumes:
  postgres_data:
